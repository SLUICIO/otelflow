<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sluicio — OTelFlow</title>
    <script>
      // Apply theme before the stylesheet loads (no flash). Light is the
      // default; 'auto' follows the OS. Per-device setting.
      ;(function () {
        var t = localStorage.getItem('sluicio.theme') || 'auto'
        var dark =
          t === 'dark' ||
          (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M 48 17 H 16 V 32 H 48 V 47 H 16' fill='none' stroke='%230E6E9E' stroke-width='9' stroke-linecap='square' stroke-linejoin='miter'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
